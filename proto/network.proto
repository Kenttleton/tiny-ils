syntax = "proto3";

package network;

option go_package = "tiny-ils/gen/networkpb;networkpb";

// ─── Common ──────────────────────────────────────────────────────────────────

message Empty {}

// ─── Peers ───────────────────────────────────────────────────────────────────

message PeerInfo {
  string node_id      = 1; // Ed25519 public key fingerprint
  string public_key   = 2; // base64-encoded Ed25519 public key
  string address      = 3; // host:port of the peer's network-manager
  string display_name = 4;
  string status       = 5; // PENDING | CONNECTED (read-only; ignored on input)
  repeated string capabilities = 6; // e.g. ["curios","users","ui"]
}

message NodeId {
  string node_id = 1;
}

message PeerAck {
  string node_id              = 1; // this node's ID
  string public_key           = 2; // this node's public key (for mutual exchange)
  repeated string capabilities = 3; // capabilities this node offers
}

message NodeAddress {
  string address = 1;
}

message NodeConfig {
  string grpc_address = 1;
}

message PeerList {
  repeated PeerInfo peers = 1;
}

// ─── Catalog federation ──────────────────────────────────────────────────────

message CurioSummary {
  string id         = 1;
  string title      = 2;
  string media_type = 3;
  string format_type = 4;
  repeated string tags = 5;
  bool   available  = 6; // at least one physical copy available, or digital seats free
  string node_id    = 7; // which node holds this curio
  string node_name  = 8;
}

message CatalogSnapshot {
  string node_id             = 1;
  repeated CurioSummary curios = 2;
  int64  snapshot_at         = 3;
}

message SyncAck {
  int32 received = 1;
}

// ─── Cross-node search ───────────────────────────────────────────────────────

message NetworkSearchRequest {
  string query               = 1;
  string media_type          = 2; // optional filter
  bool   include_unavailable = 3;
  string user_jwt            = 4; // JWT from home node; remote nodes may use for visibility rules
}

// Streamed: one message per responding peer.
message NetworkSearchResult {
  string node_id             = 1;
  string node_name           = 2;
  repeated CurioSummary curios = 3;
  string error               = 4; // non-empty if this peer failed to respond
}

// ─── Cross-node borrowing ────────────────────────────────────────────────────

message BorrowRequest {
  string curio_id        = 1; // ISO 18626: bibliographicInfo identifier
  string copy_id         = 2; // physical only; empty = auto-select available copy
  string user_jwt        = 3; // ISO 18626: patron credential (home-node signed)
  string requesting_node = 4; // ISO 18626: requestingAgencyId
  int64  need_before     = 5; // ISO 18626: serviceInfo.needBefore (unix; 0 = default loan period)
}

message BorrowResponse {
  string loan_id      = 1; // physical: PhysicalLoan.id; digital: DigitalLease.id
  int64  due_date     = 2; // physical: due date (unix); 0 for digital
  string copy_id      = 3; // physical: checked-out copy; pass back in ReturnRequest.copy_id
  bool   is_digital   = 4;
  int64  expires_at   = 5; // digital: lease expiry (unix)
  string access_token = 6; // digital: LCP license ID or provider access token
}

message ReturnRequest {
  string loan_id  = 1; // ISO 18626: loan/lease identifier
  string user_jwt = 2; // ISO 18626: patron credential
  string copy_id  = 3; // physical: copy from BorrowResponse; empty for digital (early return supported)
}

message ReturnResponse {
  int64 returned_at = 1;
}

// ─── Cross-node physical transfers ───────────────────────────────────────────

message RemoteTransferRequest {
  string transfer_id   = 1;
  string copy_id       = 2;
  string transfer_type = 3; // ILL | RETURN | PERMANENT
  string source_node   = 4;
  string dest_node     = 5;
  string initiated_by  = 6; // manager userId on requesting node
  string user_jwt      = 7; // JWT signed by the requesting node
  string notes         = 8;
}

message RemoteTransferAck {
  string transfer_id = 1;
  bool   accepted    = 2;
}

message TransferUpdate {
  string transfer_id = 1;
  string new_status  = 2; // APPROVED | IN_TRANSIT | RECEIVED | REJECTED | CANCELLED
  string actor_id    = 3; // manager userId who triggered the update
  string user_jwt    = 4; // JWT signed by the notifying node
}

// ─── Identity verification ───────────────────────────────────────────────────

message UserToken {
  string jwt = 1;
}

message VerificationResult {
  bool   valid       = 1;
  string user_id     = 2;
  string home_node   = 3;
  string role        = 4; // role on the verifying node, if any
  string error       = 5;
}

// ─── Cross-node user authentication ──────────────────────────────────────────

// Called by a CONNECTED peer (Node B) on the home node (Node A) to obtain a
// short-lived, audience-scoped JWT for one of the home node's users.
message GuestTokenRequest {
  string user_id         = 1; // user's UUID on the home node
  string requesting_node = 2; // fingerprint of the node requesting the token
}

message GuestTokenResponse {
  string token        = 1; // JWT signed by the home node; aud = requesting_node
  string display_name = 2; // user's display name for thin local record creation
}

// Called by the local BFF to log in a cross-node user via their home node.
// The network-manager dials the home node, calls IssueGuestToken, creates a
// thin local user record, and returns a node-local session JWT.
message AuthenticateGuestRequest {
  string user_id           = 1; // user's UUID on the home node
  string home_node_address = 2; // gRPC address (host:port) of the home node
  string home_node_id      = 3; // fingerprint of the home node (used to verify response)
}

message AuthenticateGuestResponse {
  string token        = 1; // local session JWT (signed by this node)
  string display_name = 2;
}

// ─── Cross-node loans / leases ───────────────────────────────────────────────

// Fan-out query: streams one result per CONNECTED peer (same pattern as SearchNetwork).
message UserLoansRequest {
  string user_id      = 1; // user's UUID (on their home node)
  string user_node_id = 2; // fingerprint of the user's home node
  bool   active_only  = 3; // if true, exclude returned/revoked records
}

// Unified physical-loan + digital-lease record for the fan-out response.
message RemoteLoan {
  string loan_id     = 1;
  string curio_id    = 2;
  string curio_title = 3;
  bool   is_digital  = 4;
  int64  issued_at   = 5;
  int64  due_date    = 6; // physical: when it must be returned (0 for digital)
  int64  expires_at  = 7; // digital: when access expires (0 for physical)
  bool   closed      = 8; // true if returned or revoked
  string node_id     = 9; // node that owns the item
  string node_name   = 10;
}

message UserLoansResult {
  string node_id            = 1;
  string node_name          = 2;
  repeated RemoteLoan loans = 3;
  string error              = 4; // non-empty if this peer failed to respond
}

// ─── Cross-node digital leasing ──────────────────────────────────────────────

message DigitalLeaseRequest {
  string curio_id        = 1;
  string user_jwt        = 2; // JWT signed by the user's home node; aud = this node
  string requesting_node = 3; // home node fingerprint (must match JWT iss)
}

message DigitalLeaseResponse {
  string lease_id     = 1;
  string access_token = 2;
  string license_url  = 3; // LSD URL when LCP is enabled
  int64  expires_at   = 4;
}

message LeaseRef {
  string lease_id = 1;
  string user_jwt = 2;
}

// ─── Outbound transfer relay (curios-manager → network-manager → remote node) ─

// ForwardTransferRequest asks the local network-manager to call InitiateRemoteTransfer
// on the specified peer. The network-manager does not interpret the transfer data —
// it only routes to the peer and checks the "curios" capability.
message ForwardTransferRequest {
  string                target_node_id = 1; // peer to contact (source node for ILL)
  RemoteTransferRequest request        = 2;
}

message ForwardTransferAck {
  string transfer_id = 1;
  bool   accepted    = 2;
}

// RelayTransferUpdateRequest asks the local network-manager to call NotifyTransferUpdate
// on the specified peer. Curios-manager sets target_node_id from the transfer record's
// source_node or dest_node. Network-manager checks "curios" capability before routing.
message RelayTransferUpdateRequest {
  string         target_node_id = 1;
  TransferUpdate update         = 2;
}

// ─── Service ─────────────────────────────────────────────────────────────────

service NetworkManager {
  // Peer registry
  rpc GetNodeInfo(Empty) returns (PeerAck);
  rpc RegisterPeer(PeerInfo) returns (PeerAck);
  rpc ListPeers(Empty) returns (PeerList);

  // Node configuration (internal-only)
  rpc GetNodeConfig(Empty)        returns (NodeConfig);  // read current grpc address
  rpc SetNodeAddress(NodeAddress) returns (Empty);        // admin override

  // Admin-initiated peer management (local BFF only)
  rpc ConnectPeer(PeerInfo) returns (PeerAck);    // outbound: store + call remote RegisterPeer
  rpc ApprovePeer(NodeId) returns (Empty);         // approve a PENDING inbound peer

  // Cross-node catalog search (streaming — one result per responding peer)
  rpc SearchNetwork(NetworkSearchRequest) returns (stream NetworkSearchResult);

  // Called by a peer node's network-manager to search this node's local catalog.
  // Returns a single result (this node only — no fan-out).
  rpc SearchCatalog(NetworkSearchRequest) returns (NetworkSearchResult);

  // Catalog snapshot sync
  rpc ShareCatalog(CatalogSnapshot) returns (SyncAck);

  // Cross-node borrowing
  rpc RequestBorrow(BorrowRequest) returns (BorrowResponse);
  rpc ReturnCurio(ReturnRequest) returns (ReturnResponse);

  // Identity verification (CONNECTED peers only — home node confirms a user JWT is valid)
  rpc VerifyUser(UserToken) returns (VerificationResult);

  // Cross-node user authentication
  // IssueGuestToken: home node issues a short-lived, audience-scoped JWT for a user
  //   — called by a CONNECTED peer that wants to authenticate one of this node's users.
  // AuthenticateGuest: local BFF calls this on its own node to log in a cross-node user;
  //   the network-manager dials the home node, obtains a guest token, creates a thin
  //   local user record, and returns a node-local session JWT.
  rpc IssueGuestToken(GuestTokenRequest)         returns (GuestTokenResponse);
  rpc AuthenticateGuest(AuthenticateGuestRequest) returns (AuthenticateGuestResponse);

  // Cross-node loans/leases — streams one result per CONNECTED peer
  rpc GetUserLoans(UserLoansRequest) returns (stream UserLoansResult);

  // Cross-node digital leasing
  rpc RequestDigitalLease(DigitalLeaseRequest) returns (DigitalLeaseResponse);
  rpc RevokeDigitalLease(LeaseRef)             returns (Empty);

  // Cross-node physical transfers
  rpc InitiateRemoteTransfer(RemoteTransferRequest) returns (RemoteTransferAck);
  rpc NotifyTransferUpdate(TransferUpdate)           returns (Empty);

  // Outbound transfer relay — called by LOCAL curios-manager only
  rpc ForwardTransfer(ForwardTransferRequest)                 returns (ForwardTransferAck);
  rpc RelayTransferUpdate(RelayTransferUpdateRequest)         returns (Empty);
}
